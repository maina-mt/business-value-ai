function unlock() {
  if (hashStr(document.getElementById('pw').value) === -240984525) {
    // UTF-8 safe decode: atob gives Latin-1 bytes; TextDecoder reads them as UTF-8
    const bytes = Uint8Array.from(atob(PAYLOAD), c => c.charCodeAt(0));
    const html  = new TextDecoder('utf-8').decode(bytes);
    document.getElementById('gate').style.display = 'none';
    const wrap = document.getElementById('report');
    wrap.style.display = 'block';
    wrap.innerHTML = html;
    wrap.querySelectorAll('script').forEach(s => {
      const ns = document.createElement('script');
      ns.textContent = s.textContent;
      document.head.appendChild(ns);
    });
  } else {
    document.getElementById('err').textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return h;
}
