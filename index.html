function unlock() {
  const pw = document.getElementById('pw').value;
  // SHA-like simple check: compare against known hash of password
  // We store a simple hash to avoid plain-text in source
  if (hashStr(pw) === -240984525) {
    const html = atob(PAYLOAD);
    document.getElementById('gate').style.display = 'none';
    const frame = document.getElementById('report');
    frame.style.display = 'block';
    frame.innerHTML = html;
    // Re-run scripts from injected content
    frame.querySelectorAll('script').forEach(s => {
      const ns = document.createElement('script');
      ns.textContent = s.textContent;
      document.head.appendChild(ns);
    });
  } else {
    document.getElementById('err').textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  }
  return h;
}
